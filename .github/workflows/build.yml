name: Build

on:
  push:
    branches: [main, 'copilot/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install
        working-directory: .

      - name: Install backend dependencies
        run: npm install

      - name: Build backend
        run: npm run build

      - name: Initialize database
        run: npm run db:init

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install
        working-directory: .

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
